name: Python CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python Files
        run: |
          python -m py_compile app.py
          python -m py_compile pdf_reader.py
          python -m py_compile text_splitter.py
          python -m py_compile rag.py
          python -m py_compile gemini_service.py
          python -m py_compile suggestions.py
          python -m py_compile insights.py

      - name: CI Passed
        run: echo "All checks passed successfully!"